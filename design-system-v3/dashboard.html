<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تدفّق الخير · لوحة التحكّم (v3.1)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800&family=Readex+Pro:wght@300;400;500;600;700&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <!-- fontshare.com: Clash Display for Latin hero numerals -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="motion.css" />
  <link rel="stylesheet" href="effects.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    body { margin: 0; }
    .wrap { max-width: var(--v3-page-max); margin: 0 auto; padding: var(--v3-s6) var(--v3-page-pad) var(--v3-s16); }
    .ms { font-family: 'Material Symbols Rounded'; line-height: 1; direction: ltr; -webkit-font-smoothing: antialiased; display:inline-block; }
    .panel-head { display:flex; align-items:center; justify-content:space-between; gap:var(--v3-s3); margin-bottom:var(--v3-s4); }
    .panel-head h2 { margin:0; font-size:var(--v3-fs-lg); font-family:var(--v3-disp); font-weight:700; }
    .feed-row { display:flex; align-items:center; gap:var(--v3-s3); padding:var(--v3-s3); border-radius:var(--v3-r); cursor:pointer; transition:background var(--v3-dur-2) var(--v3-ease); }
    .feed-row:hover { background:var(--v3-surface-2); }
    .feed-lead { width:8px; height:8px; border-radius:var(--v3-r-pill); flex:none; }
    .feed-main { flex:1; min-width:0; }
    .feed-sub { color:var(--v3-ink-3); font-size:var(--v3-fs-xs); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .feed-row .ms.chev { font-size:20px; color:var(--v3-ink-4); }
    .svc-row { display:flex; align-items:center; gap:var(--v3-s3); padding:10px; border-radius:var(--v3-r); cursor:pointer; transition:background var(--v3-dur-2) var(--v3-ease); }
    .svc-row:hover { background:var(--v3-surface-2); }
    .svc-icn { width:34px; height:34px; border-radius:var(--v3-r-sm); display:grid; place-items:center; color:#fff; flex:none; }
    .svc-icn .ms { font-size:20px; }
    .divider { height:1px; background:var(--v3-border); margin:6px 0; }
    .hero-card { display:flex; flex-direction:column; justify-content:space-between; padding:var(--v3-s6); border-radius:var(--v3-r-xl); min-height:240px; }
    .ops-card { display:flex; flex-direction:column; gap:var(--v3-s4); }
    .ops-block { padding:var(--v3-s4); border-radius:var(--v3-r-md); background:var(--v3-surface-2); border:1px solid var(--v3-border); }
  </style>
</head>
<body class="v3 v3-atmos">
  <div id="app"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="../data.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;
    const deptToken = { CS:'var(--v3-cs)', CT:'var(--v3-ct)', CB:'var(--v3-cb)', CA:'var(--v3-ca)' };
    const Icon = ({n, cls}) => <span className={"ms"+(cls?" "+cls:"")}>{n}</span>;

    /* ---- TRANSPARENCY + TRUST: honest fee/permission view ---- */
    function FeeView({c}) {
      if (c.fee > 0) {
        return (<span className="v3-trust v3-trust--confirmed"><Icon n="verified" /> {window.fmtIQD(c.fee)}</span>);
      }
      if (c.status === 'موافقة مدير') {
        return (<span className="v3-gate"><Icon n="admin_panel_settings" /> يتطلب موافقة مدير</span>);
      }
      // fee not yet known — never fake a number
      return (<span className="v3-pending-value"><Icon n="hourglass_empty" /> تُحدّد بعد الكشف</span>);
    }

    function Chrome({dark, setDark}) {
      return (
        <header className="v3-chrome">
          <div className="v3-brand">
            <span className="v3-brand__mark">ت</span>
            <span>تدفّق الخير<br/><span className="v3-mono" style={{fontWeight:500,color:'var(--v3-ink-3)'}}>لوحة التحكّم · v3.1</span></span>
          </div>
          <span className="v3-chip">كهرباء الرصافة · فرع النضال</span>
          {/* progressive-disclosure: morphing search */}
          <label className="v3-search" style={{marginInlineStart:'auto'}}>
            <Icon n="search" />
            <input placeholder="ابحث عن مشترك أو رقم طلب…" aria-label="بحث" />
            <span className="v3-mono">⌘K</span>
          </label>
          <span className="v3-sync"><Icon n="cloud_done" /> محدّث الآن</span>
          <button className="v3-toggle" aria-checked={dark} aria-label="تبديل الوضع الليلي" onClick={()=>setDark(d=>!d)}></button>
          <button className="v3-btn v3-btn--icon" aria-label="الحساب">م</button>
        </header>
      );
    }

    function App() {
      const [dark, setDark] = useState(false);
      const [period, setPeriod] = useState('day');
      const [saving, setSaving] = useState(false);
      const [openDept, setOpenDept] = useState(null);
      const [showAllCases, setShowAllCases] = useState(false);
      const [dismissedUrgent, setDismissedUrgent] = useState(false);
      useEffect(()=>{ document.body.classList.toggle('v3-dark', dark); }, [dark]);
      // simulate autosave heartbeat (system-leads)
      useEffect(()=>{ const t=setInterval(()=>{ setSaving(true); setTimeout(()=>setSaving(false),900); }, 6000); return ()=>clearInterval(t); }, []);

      const K = window.KPIS, sections = window.SECTIONS;
      const allCases = window.RECENT_CASES;
      const cases = showAllCases ? allCases : allCases.slice(0,4);
      const topServices = useMemo(()=>[...window.SERVICES].sort((a,b)=>b.popularity-a.popularity).slice(0,5), []);
      const deptCount = useMemo(()=>{ const m={}; window.SERVICES.forEach(s=>m[s.section]=(m[s.section]||0)+1); return m; }, []);
      const deptServices = useMemo(()=>{ const m={}; window.SERVICES.forEach(s=>{(m[s.section]=m[s.section]||[]).push(s);}); return m; }, []);
      const prioColor = { urgent:'var(--v3-err)', vip:'var(--v3-gold)', standard:'var(--v3-ok)' };
      const urgentCase = allCases.find(c=>c.priority==='urgent');
      const urgentAdv = urgentCase ? window.getAdvisories(urgentCase.svc).find(a=>a.t==='danger') : null;

      return (
        <React.Fragment>
          <Chrome dark={dark} setDark={setDark} />
          <div className="wrap">

            <div className="v3-bento">

              {/* HERO — grainy navy gradient + Clash Display number */}
              <div className="hero-card v3-grain v3-grad-navy col-8 row-2 v3-rise">
                <div>
                  <span className="v3-handoff v3-handoff--system" style={{background:'rgba(255,255,255,.15)',color:'#fff'}}><Icon n="auto_awesome" /> ملخّص آلي</span>
                  <h1 className="v3-display" style={{margin:'12px 0 4px',fontSize:'var(--v3-fs-xl)',color:'#fff'}}>حركة {period==='day'?'اليوم':period==='week'?'الأسبوع':'الشهر'}</h1>
                  <p style={{margin:0,color:'rgba(255,255,255,.7)',fontSize:'var(--v3-fs-sm)'}}>مركز النضال · ملخّص الطلبات المفتوحة والمحصّلات</p>
                </div>
                <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:'var(--v3-s4)',flexWrap:'wrap'}}>
                  <div>
                    <div className="v3-hero-num" style={{fontSize:'clamp(3rem,7vw,5rem)',color:'#fff'}}>{window.fmt(K.todayCases)}</div>
                    <div style={{color:'rgba(255,255,255,.7)',fontSize:'var(--v3-fs-sm)'}}>طلب اليوم · <span style={{color:'var(--v3-gold-soft)'}}>+{K.todayDelta}%</span> عن أمس</div>
                  </div>
                  <div className="v3-seg" role="tablist" style={{background:'rgba(255,255,255,.14)',border:'none'}}>
                    {[['day','اليوم'],['week','الأسبوع'],['month','الشهر']].map(([k,l])=>(
                      <button key={k} className="v3-seg__opt" aria-selected={period===k} onClick={()=>setPeriod(k)} style={period!==k?{color:'rgba(255,255,255,.8)'}:{}}>{l}</button>
                    ))}
                  </div>
                </div>
              </div>

              {/* OPS panel — mixed-initiative + transparency */}
              <div className="ops-card col-4 row-2 v3-rise v3-rise-1">
                <div className="v3-card ops-card" style={{flex:1}}>
                  <div className="panel-head"><h2>الحالة التشغيلية</h2></div>
                  {/* system-leads: autosave */}
                  <div className="ops-block" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className={"v3-autosave"+(saving?" v3-autosave--saving":"")}>
                      <span className="v3-autosave__dot"></span>{saving?'يُحفظ…':'كل التغييرات محفوظة'}
                    </span>
                    <span className="v3-handoff v3-handoff--system"><Icon n="sync" /> النظام</span>
                  </div>
                  {/* data freshness */}
                  <div className="ops-block">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span className="v3-sync"><Icon n="database" /> مزامنة البيانات</span>
                      <span className="v3-source">SOURCE · SCADA</span>
                    </div>
                    <div style={{marginTop:8,fontSize:'var(--v3-fs-sm)',color:'var(--v3-ink-3)'}}>آخر تحديث قبل 12 ثانية · {window.fmt(K.pending)} طلب قيد المعالجة</div>
                  </div>
                  {/* urgent advisory — danger, user must lead */}
                  {urgentAdv && !dismissedUrgent && (
                    <div className="v3-confirm">
                      <Icon n="warning" cls="" />
                      <span className="v3-confirm__txt"><b>بلاغ خطر · {urgentCase.id}</b><br/>{urgentAdv.x}</span>
                      <div style={{display:'flex',gap:8}}>
                        <button className="v3-btn v3-btn--primary" style={{minHeight:38,padding:'8px 14px'}}>إشعار الطوارئ</button>
                        <button className="v3-btn v3-btn--ghost" style={{minHeight:38,padding:'8px 14px'}} onClick={()=>setDismissedUrgent(true)}>لاحقاً</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* KPI mini cards */}
              {[
                {dept:'CS',icon:'bolt',num:window.fmt(K.todayCases),label:'طلبات اليوم',delta:K.todayDelta,spark:[40,55,38,70,52,88,64]},
                {dept:'CB',icon:'hourglass_top',num:window.fmt(K.pending),label:'قيد المعالجة',delta:5,spark:[60,64,58,72,68,75,80]},
                {dept:'CT',icon:'payments',num:window.fmtIQD(K.collected),label:'محصّل اليوم',delta:9,spark:[30,48,42,66,58,80,92]},
                {dept:'CA',icon:'sentiment_satisfied',num:K.satisfaction+'٪',label:'رضا المراجعين',delta:2,spark:[70,72,68,78,82,88,94]},
              ].map((s,i)=>(
                <div className="v3-card v3-stat col-3 v3-rise v3-rise-2" key={i} style={{'--dept':deptToken[s.dept]}}>
                  <div className="v3-stat__top">
                    <span className="v3-stat__icn"><Icon n={s.icon} /></span>
                    <span className={"v3-stat__delta "+(s.delta>=0?'up':'dn')}>{s.delta>=0?'+':''}{s.delta}%</span>
                  </div>
                  <div><div className="v3-stat__num v3-num">{s.num}</div><div className="v3-stat__lab">{s.label}</div></div>
                  <div className="v3-spark">{s.spark.map((h,j)=><i key={j} style={{height:h+'%'}} />)}</div>
                </div>
              ))}

              {/* ACTIVITY FEED — transparency on every amount */}
              <div className="v3-card col-8 v3-rise v3-rise-3">
                <div className="panel-head">
                  <h2>أحدث الطلبات</h2>
                  <span className="v3-sync"><Icon n="cloud_done" /> تتحدّث آلياً</span>
                </div>
                {cases.map((c,i)=>{
                  const svc = window.SERVICE_MAP[c.svc]; 
                  return (
                    <React.Fragment key={c.id}>
                      <div className="feed-row" tabIndex={0}>
                        <span className="feed-lead" style={{background:prioColor[c.priority]}}></span>
                        <div className="feed-main">
                          <div style={{fontWeight:650}}>{svc.name}</div>
                          <div className="feed-sub">
                            <span className="v3-mono" style={{color:deptToken[svc.section]}}>{c.id}</span>
                            <span>·</span><span>{c.subscriber}</span>
                            <span>·</span><span><Icon n="person" cls="" style={{fontSize:13}} /> {c.officer}</span>
                          </div>
                        </div>
                        <div style={{textAlign:'left',display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>
                          <span className="v3-badge">{c.status}</span>
                          <FeeView c={c} />
                          <span className="v3-mono" style={{color:'var(--v3-ink-4)'}}>{c.age}</span>
                        </div>
                        <Icon n="chevron_left" cls="chev" />
                      </div>
                      {i<cases.length-1 && <div className="divider"></div>}
                    </React.Fragment>
                  );
                })}
                {/* progressive-disclosure: show more */}
                {!showAllCases && allCases.length>4 && (
                  <button className="v3-more" style={{marginTop:10}} onClick={()=>setShowAllCases(true)}>
                    <Icon n="expand_more" /> عرض {allCases.length-4} طلبات إضافية
                  </button>
                )}
              </div>

              {/* SIDEBAR: top services + departments disclosure */}
              <div className="col-4" style={{display:'flex',flexDirection:'column',gap:'var(--v3-s4)'}}>
                <div className="v3-card v3-rise v3-rise-3">
                  <div className="panel-head"><h2>الأكثر طلباً</h2><span className="v3-mono" style={{color:'var(--v3-ink-3)'}}>TOP 5</span></div>
                  {topServices.map(s=>(
                    <div className="svc-row" key={s.code} tabIndex={0}>
                      <span className="svc-icn" style={{background:`linear-gradient(150deg, color-mix(in srgb, ${deptToken[s.section]} 75%, #fff), ${deptToken[s.section]})`}}><Icon n={s.icon} /></span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:'var(--v3-fs-sm)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</div>
                        <div className="v3-mono" style={{color:deptToken[s.section]}}>{s.code} · SLA {s.sla}ي</div>
                      </div>
                      <span className="v3-num" style={{color:'var(--v3-ink-3)',fontSize:'var(--v3-fs-sm)'}}>{s.popularity}٪</span>
                    </div>
                  ))}
                </div>

                {/* progressive-disclosure: expandable departments */}
                <div className="v3-card v3-rise v3-rise-4">
                  <div className="panel-head"><h2>الأقسام</h2><span className="v3-sub" style={{fontSize:'var(--v3-fs-xs)'}}>اضغط للتوسيع</span></div>
                  {sections.map(sec=>(
                    <div className={"v3-disclose"} key={sec.code} {...(openDept===sec.code?{open:true}:{})}>
                      <div className="v3-disclose__head" tabIndex={0} role="button" aria-expanded={openDept===sec.code}
                           onClick={()=>setOpenDept(openDept===sec.code?null:sec.code)}>
                        <span style={{display:'flex',alignItems:'center',gap:10}}>
                          <span className="svc-icn" style={{background:`linear-gradient(150deg, color-mix(in srgb, ${deptToken[sec.code]} 75%, #fff), ${deptToken[sec.code]})`}}><Icon n={sec.icon} /></span>
                          <span><span style={{fontWeight:650}}>{sec.name}</span><br/><span className="v3-mono" style={{color:deptToken[sec.code]}}>{sec.code} · {deptCount[sec.code]} خدمة</span></span>
                        </span>
                        <Icon n="chevron_left" cls="chev" />
                      </div>
                      {openDept===sec.code && (
                        <div className="v3-disclose__body">
                          {deptServices[sec.code].slice(0,5).map(s=>(
                            <div className="svc-row" key={s.code} tabIndex={0} style={{padding:'7px 8px'}}>
                              <Icon n={s.icon} cls="" style={{fontSize:18,color:deptToken[sec.code]}} />
                              <span style={{flex:1,fontSize:'var(--v3-fs-sm)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</span>
                              {s.fixedPrice ? <span className="v3-trust v3-trust--confirmed">{window.fmtIQD(s.fixedPrice)}</span>
                                : s.hasPrice ? <span className="v3-trust v3-trust--estimate"><Icon n="info" /> {s.priceNote}</span>
                                : <span className="v3-trust v3-trust--pending">بلا أجور</span>}
                            </div>
                          ))}
                          {deptServices[sec.code].length>5 && <div className="v3-source" style={{padding:'4px 8px'}}>+ {deptServices[sec.code].length-5} خدمة أخرى</div>}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

            </div>

            <footer style={{marginTop:'var(--v3-s16)',textAlign:'center',color:'var(--v3-ink-3)'}}>
              <span className="v3-mono">TADFUQ KHAYR · DASHBOARD · DESIGN SYSTEM v3.1 · LUMINOUS CALM</span>
            </footer>
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
