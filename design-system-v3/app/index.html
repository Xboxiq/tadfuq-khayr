<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تدفّق الخير · المنصة v3 (Luminous Calm)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800&family=Readex+Pro:wght@300;400;500;600;700&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
  <!-- design system v3 (isolated) -->
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../motion.css" />
  <link rel="stylesheet" href="../effects.css" />
  <link rel="stylesheet" href="../components.css" />
  <style>
    body { margin: 0; }
    .ms { font-family: 'Material Symbols Rounded'; line-height: 1; direction: ltr; display: inline-block; vertical-align: middle; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: var(--v3-page-max); margin: 0 auto; padding: var(--v3-s6) var(--v3-page-pad) var(--v3-s16); }
    .panel-head { display:flex; align-items:center; justify-content:space-between; gap:var(--v3-s3); margin-bottom:var(--v3-s4); }
    .panel-head h2 { margin:0; font-size:var(--v3-fs-md); font-family:var(--v3-disp); font-weight:700; }
    .ops-block { padding:var(--v3-s3) var(--v3-s4); border-radius:var(--v3-r-md); background:var(--v3-surface-2); border:1px solid var(--v3-border); }
    .hero-card { display:flex; flex-direction:column; justify-content:space-between; padding:var(--v3-s6); border-radius:var(--v3-r-xl); min-height:240px; }
    .svc-row { display:flex; align-items:center; gap:var(--v3-s3); padding:10px; border-radius:var(--v3-r); cursor:pointer; transition:background var(--v3-dur-2) var(--v3-ease); }
    .svc-row:hover { background:var(--v3-surface-2); }
    .svc-icn { width:34px; height:34px; border-radius:var(--v3-r-sm); display:grid; place-items:center; color:#fff; flex:none; }
    .svc-icn .ms { font-size:20px; }
    /* department deck (expandable, ported to v3) */
    .deck { display:flex; gap:var(--v3-s4); }
    .deck-panel { flex:1; min-height:200px; overflow:hidden; }
    .deck-panel.is-open { flex:2.6; }
    .deck-wm { position:absolute; inset-inline-end:-10px; top:-20px; font-family:var(--v3-disp); font-weight:800; font-size:5rem; color:color-mix(in srgb, var(--dept) 8%, transparent); pointer-events:none; }
    .deck-full { opacity:0; max-height:0; transition:opacity var(--v3-dur-3) var(--v3-ease); }
    .deck-panel.is-open .deck-full { opacity:1; max-height:none; margin-top:auto; }
    @media (max-width:900px){ .deck{flex-direction:column;} .deck-panel,.deck-panel.is-open{flex:1;} .deck-full{opacity:1;max-height:none;} }
  </style>
</head>
<body class="v3 v3-atmos">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <!-- real platform data (read-only, shared with original) -->
  <script src="../../data.js"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
